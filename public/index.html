<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e12" />
    <meta name="color-scheme" content="dark" />
    <title>CRIMSON RELAY</title>
    <link rel="icon" href="/assets/relay-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="game-shell" class="game-shell" aria-label="CRIMSON RELAY game client">
      <canvas id="game-canvas" aria-label="Isometric game world"></canvas>
      <div id="world-art" class="world-art" aria-hidden="true"></div>
      <div id="title-art" class="title-art" aria-hidden="true"></div>

      <header class="topbar">
        <div class="brand-lockup" aria-label="CRIMSON RELAY">
          <img src="/assets/relay-mark.svg" alt="" width="36" height="36" />
          <div>
            <strong>CRIMSON RELAY</strong>
          <span id="sector-label">节点 // 未连接</span>
          </div>
        </div>
        <div class="server-readout">
          <span id="population" class="population" hidden>0 在线</span>
          <span id="connection" class="connection is-connecting" role="status">
            <i aria-hidden="true"></i>
            <b>连接中</b>
          </span>
        </div>
      </header>

      <section id="join-panel" class="join-panel" aria-labelledby="join-title">
        <div class="join-heading">
          <span class="eyebrow">中继接入</span>
          <h1 id="join-title">选择角色</h1>
        </div>

        <div id="archetype-list" class="archetype-list" role="radiogroup" aria-label="选择角色"></div>
        <div id="hero-detail" class="hero-detail" aria-live="polite"></div>

        <form id="join-form" class="join-form" autocomplete="off">
          <label for="operator-name">操作员呼号</label>
          <div class="join-controls">
            <input id="operator-name" name="name" type="text" minlength="2" maxlength="16" value="Relay-07" spellcheck="false" required />
            <button id="join-button" class="primary-command" type="submit">
              <span>接入中继</span>
              <span aria-hidden="true">&gt;</span>
            </button>
          </div>
          <p id="join-error" class="form-error" role="alert" hidden></p>
        </form>
      </section>

      <section id="hud" class="hud" aria-label="操作员状态" hidden>
        <aside class="operator-panel" aria-label="操作员">
          <div class="operator-heading">
            <div id="operator-sigil" class="operator-sigil">V</div>
            <div>
              <span id="operator-class">先锋</span>
              <strong id="operator-display-name">RELAY-07</strong>
            </div>
            <b id="operator-level">L01</b>
          </div>
          <div class="meter health-meter">
            <div id="health-fill" class="meter-fill"></div>
            <span><b id="health-current">100</b> / <span id="health-max">100</span></span>
          </div>
          <div class="meter energy-meter">
            <div id="energy-fill" class="meter-fill"></div>
            <span><b id="energy-current">100</b> / <span id="energy-max">100</span></span>
          </div>
          <div class="xp-row">
            <span>同步</span>
            <div class="xp-track"><i id="xp-fill"></i></div>
            <b id="xp-value">0%</b>
          </div>
          <div id="currency-row" class="currency-row">
            <span id="gold-amount">金币 0</span>
            <span id="dew-amount">复苏露 0</span>
          </div>
          <div id="alignment-row" class="alignment-row" hidden>
            <span id="alignment-text"></span>
            <button id="attune-button" class="mini-command" type="button" title="立誓转向另一条路线：此后每次施放技能，名誉都会向所选一侧偏移">转向</button>
          </div>
          <button id="auto-fight-toggle" class="mini-command auto-fight-toggle" type="button" title="站立时自动反击射程内的敌人（快捷键 T）">自动战斗 · 开</button>
          <button id="auto-level-toggle" class="mini-command auto-fight-toggle" type="button" title="升级获得的属性点与技能点自动按职业最优方案分配">自动加点 · 开</button>
          <button id="rebirth-button" class="rebirth-button" type="button" title="重置等级，换取永久强化" hidden>转生</button>
        </aside>

        <aside class="stats-panel" aria-label="属性">
          <div class="panel-title">
            <span>属性</span>
            <b id="stat-points">0 点</b>
          </div>
          <div class="stat-grid">
            <div class="stat-row" data-stat="power">
              <span><i class="stat-glyph power">P</i> 力量</span>
              <b class="stat-value">10</b>
              <button type="button" class="allocate-button" title="强化力量" aria-label="强化力量">+</button>
            </div>
            <div class="stat-row" data-stat="agility">
              <span><i class="stat-glyph agility">A</i> 敏捷</span>
              <b class="stat-value">10</b>
              <button type="button" class="allocate-button" title="强化敏捷" aria-label="强化敏捷">+</button>
            </div>
            <div class="stat-row" data-stat="spirit">
              <span><i class="stat-glyph spirit">S</i> 精神</span>
              <b class="stat-value">10</b>
              <button type="button" class="allocate-button" title="强化精神" aria-label="强化精神">+</button>
            </div>
            <div class="stat-row" data-stat="vitality">
              <span><i class="stat-glyph vitality">V</i> 体魄</span>
              <b class="stat-value">10</b>
              <button type="button" class="allocate-button" title="强化体魄" aria-label="强化体魄">+</button>
            </div>
          </div>
        </aside>

        <aside class="gear-panel" aria-label="装备与背包">
          <div class="panel-title">
            <span>装备</span>
            <span class="panel-title-actions">
              <button id="auto-equip-button" class="mini-command" type="button" title="自动穿上每个部位最强的装备">自动</button>
              <b id="bag-count">0/24</b>
            </span>
          </div>
          <div id="equipment-doll" class="equipment-doll" aria-label="穿戴部位"></div>
          <div id="inventory-list" class="inventory-list"></div>
        </aside>

        <aside class="quest-panel" aria-label="当前目标">
          <span class="eyebrow">活跃信号</span>
          <strong id="quest-title">守住中继站</strong>
          <p id="quest-summary">已清除入侵单位</p>
          <div class="quest-progress">
            <i id="quest-fill"></i>
          </div>
          <div class="quest-count"><span id="quest-current">0</span> / <span id="quest-target">8</span></div>
        </aside>

        <div id="event-feed" class="event-feed" aria-live="polite"></div>

        <aside id="shop-panel" class="shop-panel" hidden>
          <div class="panel-title"><span id="shop-name">商店</span></div>
          <div id="shop-goods" class="shop-goods"></div>
        </aside>

        <aside id="social-panel" class="social-panel" hidden>
          <div class="panel-title"><span>社交</span><b id="party-state"></b></div>
          <div id="social-list" class="social-list"></div>
        </aside>

        <nav class="action-bar" aria-label="能力">
          <button type="button" class="ability is-primary" data-ability="primary" title="脉冲打击">
            <span class="ability-icon strike-icon" aria-hidden="true"></span>
            <span class="ability-name">脉冲打击</span>
            <kbd>M1</kbd>
          </button>
          <button type="button" class="ability" data-ability="q" title="施放 Q 能力">
            <span class="ability-icon q-icon" aria-hidden="true"></span>
            <span id="skill-q-name" class="ability-name">中继爆发</span>
            <kbd>Q</kbd>
            <i class="cooldown" aria-hidden="true"></i>
            <span id="skill-q-level" class="skill-level">I</span>
          </button>
          <button type="button" class="ability" data-ability="e" title="施放 E 能力">
            <span class="ability-icon e-icon" aria-hidden="true"></span>
            <span id="skill-e-name" class="ability-name">相位疾步</span>
            <kbd>E</kbd>
            <i class="cooldown" aria-hidden="true"></i>
            <span id="skill-e-level" class="skill-level">I</span>
          </button>
          <button type="button" class="ability is-ultimate" data-ability="f" title="施放大招">
            <span class="ability-icon q-icon" aria-hidden="true"></span>
            <span id="skill-f-name" class="ability-name">大招</span>
            <kbd>F</kbd>
            <i class="cooldown" aria-hidden="true"></i>
            <span id="skill-f-level" class="skill-level">I</span>
          </button>
          <div id="skill-upgrades" class="skill-upgrades" hidden>
            <span id="skill-points">0 技能点</span>
            <button type="button" data-upgrade="q" title="升级 Q" aria-label="升级 Q">Q+</button>
            <button type="button" data-upgrade="e" title="升级 E" aria-label="升级 E">E+</button>
            <button type="button" data-upgrade="f" title="升级大招" aria-label="升级大招">F+</button>
          </div>
        </nav>
      </section>

      <section id="death-panel" class="death-panel" aria-live="assertive" hidden>
        <span class="eyebrow">信号丢失</span>
        <strong>操作员已断开</strong>
        <p id="respawn-timer">信号可以重连</p>
        <button id="respawn-button" class="primary-command" type="button">重新连接</button>
        <button id="revive-button" class="primary-command revive-command" type="button">复苏露 · 原地复活</button>
      </section>

      <div id="screen-vignette" class="screen-vignette" aria-hidden="true"></div>
    </main>
    <script src="/client.js" defer></script>
  </body>
</html>
