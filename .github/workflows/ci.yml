# Every push and PR must prove: the server suite passes, all scripts parse,
# the browser client survives real headless-Chrome interaction tests,
# the Godot project imports and its client can join a live server headlessly,
# and the systemd unit stays valid. Pair with branch protection on main so
# unverified protocol/GDScript/deploy changes cannot land.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GODOT_VERSION: 4.3-stable

jobs:
  server:
    name: Server tests & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test

  browser:
    name: Browser interaction tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The harness talks directly to ubuntu-latest's system Chrome over CDP;
      # no bundled browser or heavyweight automation dependency is needed.
      - run: npm run test:browser

  stress-smoke:
    name: Deterministic capacity smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Start isolated server
        run: |
          HOST=127.0.0.1 PORT=8080 PERSIST_PATH= node src/server/server.js > /tmp/crimson-ci-server.log 2>&1 &
          echo "$!" > /tmp/crimson-ci-server.pid
          for attempt in $(seq 1 40); do
            curl --fail --silent http://127.0.0.1:8080/ready > /dev/null && exit 0
            sleep 0.25
          done
          cat /tmp/crimson-ci-server.log
          exit 1
      - name: Enforce short capacity floor
        run: |
          npm run stress -- 10 8 ws://127.0.0.1:8080/ws \
            --seed pull-request --min-join-ratio 1 --min-active-ratio 1 \
            --min-tick-ratio 0.9 --max-p95-ms 500 --max-p99-ms 750 \
            --max-errors 0 --require-ready
      - name: Stop server
        if: always()
        run: |
          if test -f /tmp/crimson-ci-server.pid; then
            kill "$(cat /tmp/crimson-ci-server.pid)" || true
          fi

  godot:
    name: Godot import & live smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Godot
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}
      - name: Install Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -sL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp
          mv "/tmp/Godot_v${GODOT_VERSION}_linux.x86_64" ~/.local/bin/godot
          chmod +x ~/.local/bin/godot
      - name: Add Godot to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Cache Godot export templates
        id: godot-export-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}
          key: godot-export-${{ env.GODOT_VERSION }}
      - name: Install Godot export templates
        if: steps.godot-export-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}
          curl -sL -o /tmp/godot-templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          rm -rf /tmp/godot-templates
          mkdir -p /tmp/godot-templates
          unzip -q /tmp/godot-templates.tpz -d /tmp/godot-templates
          cp -a /tmp/godot-templates/templates/. \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}/
      - name: Import check (scripts must parse)
        run: |
          npm run check:godot 2>&1 | tee /tmp/godot-check.log
          ! grep -Ei "SCRIPT ERROR|Parse Error" /tmp/godot-check.log
      - name: Linux headless release export
        run: |
          rm -rf /tmp/crimson-godot-export
          mkdir -p /tmp/crimson-godot-export
          godot --headless --path clients/godot \
            --export-release "Linux/X11" /tmp/crimson-godot-export/crimson-relay \
            2>&1 | tee /tmp/godot-export.log
          test -s /tmp/crimson-godot-export/crimson-relay
          test -x /tmp/crimson-godot-export/crimson-relay
          ! grep -Ei "SCRIPT ERROR|Parse Error|Export failed|ERROR: Failed" /tmp/godot-export.log
      - name: Headless smoke against a live server
        run: |
          rm -rf /tmp/crimson-godot-data /tmp/crimson-godot-accounts.json*
          HOST=127.0.0.1 PORT=3000 PERSIST_PATH=/tmp/crimson-godot-accounts.json node src/server/server.js &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 2
          cd clients/godot
          XDG_DATA_HOME=/tmp/crimson-godot-data \
            CRIMSON_AUTOJOIN=CI CRIMSON_SMOKE=8 \
            timeout 90 godot --headless 2>&1 | tee /tmp/smoke.log
          grep -q "joined as CI" /tmp/smoke.log
          grep -q "smoke: joined=true" /tmp/smoke.log
          ! grep -Ei "SCRIPT ERROR|Parse Error" /tmp/smoke.log
          test "$(stat -c '%a' '/tmp/crimson-godot-data/godot/app_userdata/Crimson Relay/session.cfg')" = 600

  systemd:
    name: systemd unit verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: systemd-analyze verify deploy/crimson-relay.service

  proxy-config:
    name: Reverse proxy syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/deploy/Caddyfile.example:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Create disposable nginx certificate
        run: |
          mkdir -p /tmp/crimson-cert
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -subj /CN=play.example.com \
            -keyout /tmp/crimson-cert/privkey.pem \
            -out /tmp/crimson-cert/fullchain.pem
      - name: Validate nginx site
        run: |
          docker run --rm \
            -v "$PWD/deploy/nginx.conf.example:/etc/nginx/conf.d/crimson-relay.conf:ro" \
            -v "/tmp/crimson-cert:/etc/letsencrypt/live/play.example.com:ro" \
            nginx:stable-alpine nginx -t
