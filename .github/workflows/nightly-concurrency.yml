# The default gate (`npm test`, see ci.yml) runs serially: under a restricted
# sandbox the concurrent runner does not merely flake on the local-listener
# tests, it hangs, so T-043 pinned --test-concurrency=1 to keep the gate
# trustworthy. That trade removed the only place an under-load timing bug could
# surface, and this repo has had a real one (T-038) plus a file-level false red
# that only ever appeared under concurrency.
#
# This workflow buys that coverage back without putting the false red on pull
# requests: it runs nightly, never on push or PR, so it can never block a merge.
# It fails hard rather than continue-on-error on purpose -- a green run nobody
# reads would manufacture the belief that this area is covered, which is the
# failure mode the task was written to avoid. A scheduled workflow that fails on
# the default branch notifies the repository owner, the same channel stress.yml
# already relies on.
name: Nightly concurrency

on:
  schedule:
    # Offset from stress.yml (03:17) so the two never contend for a runner.
    - cron: "43 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  concurrent-suite:
    name: Server suite at --test-concurrency=2
    runs-on: ubuntu-latest
    # Concurrency hangs rather than fails when local listeners are isolated, so
    # the job timeout is load-bearing, not decoration.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run the suite concurrently
        # The inner timeout fails the step with its output intact; without it a
        # hang would be killed at the job level and the log would end mid-run.
        run: timeout 300 npm run test:concurrent 2>&1 | tee /tmp/crimson-concurrent.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crimson-concurrent-${{ github.run_id }}
          path: /tmp/crimson-concurrent.log
          if-no-files-found: ignore
